<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>MASTER CONTROL</title>
    
    <script src="config.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: #242526; 
            color: #e2e8f0;
            padding: 0; margin: 0;
            touch-action: manipulation; 
        }

        /* --- ЭКРАН ПИН-КОДА --- */
        #pin-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #242526; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 2000;
            touch-action: manipulation; 
        }
        .pin-title { color: #94a3b8; font-size: 16px; font-weight: 600; margin-bottom: 24px; letter-spacing: 2px; }
        .pin-dots { display: flex; gap: 16px; margin-bottom: 40px; height: 16px; }
        .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #64748b; background: transparent; transition: 0.2s; }
        .pin-dot.filled { background: #cbd5e1; border-color: #cbd5e1; }
        .pin-dot.error { border-color: #ef4444; background: #ef4444; }
        
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 280px; }
        .num-btn {
            background: #2f3136; border: 1px solid #40444b; border-radius: 50%;
            width: 75px; height: 75px; color: #f8fafc; font-size: 28px; font-weight: 300;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto; cursor: pointer; transition: 0.1s;
            touch-action: manipulation; 
        }
        .num-btn:active { background: #40444b; transform: scale(0.95); }
        .num-btn.action-btn { 
            font-size: 20px; font-weight: 600; 
            color: #f87171; border-color: rgba(248, 113, 113, 0.2); 
            background: rgba(239, 68, 68, 0.05); 
        }
        .num-btn:active { background: rgba(239, 68, 68, 0.15); }
        .pin-version { position: absolute; bottom: 30px; opacity: 0.6; }

        /* --- ОСНОВНОЙ ИНТЕРФЕЙС --- */
        #main-app { display: none; padding: 4px; padding-bottom: 20px; }
        .header-panel { border-bottom: 2px solid #40444b; padding-bottom: 8px; margin-bottom: 12px; margin-top: 4px; position: relative; }
        h2 { font-size: 20px; text-transform: uppercase; margin: 0; font-weight: 800; color: #cbd5e1; letter-spacing: 0.5px; text-align: center; }
        .version-label { text-align: center; font-size: 10px; color: #64748b; font-family: monospace; margin-top: 4px; letter-spacing: 1px; }
        
        /* Кнопки управления в шапке */
        .nav-controls { position: absolute; right: 8px; top: 4px; display: flex; gap: 14px; }
        .nav-btn { background: transparent; border: none; font-size: 18px; cursor: pointer; padding: 4px; touch-action: manipulation; }
        .nav-btn:active { transform: scale(0.9); opacity: 0.7; }

        table { width: 100%; border-collapse: collapse; background: #2f3136; border-radius: 4px; overflow: hidden; table-layout: fixed; }
        th, td { border-bottom: 1px solid #40444b; padding: 10px 6px; vertical-align: middle; }
        th { background-color: #242526; color: #94a3b8; font-weight: 600; font-size: 12px; text-transform: uppercase; padding: 12px 6px; text-align: center; border-bottom: 2px solid #40444b; }
        
        .client-col { text-align: left; padding-left: 8px; line-height: 1.3; }
        .client-name { 
            font-size: 16px; font-weight: 700; color: #f8fafc; display: inline-block; word-wrap: break-word; 
            cursor: pointer; border-bottom: 1px dashed #64748b; padding-bottom: 2px;
        }
        .client-key { font-size: 11px; color: #94a3b8; font-family: monospace; display: block; margin-top: 2px; }
        .control-cell { display: flex; flex-direction: column; gap: 6px; align-items: stretch; padding: 0 4px; }
        
        .days-badge { font-size: 13px; font-weight: 800; padding: 4px 0; border-radius: 4px; text-align: center; text-transform: uppercase; }
        .safe-badge { background-color: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(74, 222, 128, 0.3); } 
        .danger-badge { background-color: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3); } 
        
        .locked-row { background-color: #202225; opacity: 0.8; }
        /* ИСПРАВЛЕНО: убрано pointer-events: none, теперь параметры заблокированных открываются свободно */
        .locked-row .client-name { text-decoration: line-through; color: #64748b; border-bottom: 1px dashed #40444b; }

        .btn { width: 100%; padding: 12px 2px; font-size: 11px; font-weight: 700; border: none; border-radius: 4px; cursor: pointer; color: #fff; text-transform: uppercase; touch-action: manipulation; }
        .btn:active { opacity: 0.8; }
        .btn-red { background-color: #b91c1c; }
        .btn-green { background-color: #15803d; }
        .btn-dark { background-color: #40444b; color: #cbd5e1; }
        .btn:disabled { background-color: #40444b; color: #94a3b8; cursor: not-allowed; }
        .loader { padding: 30px; text-align: center; font-weight: bold; color: #94a3b8; }

        /* --- МОДАЛЬНОЕ ОКНО --- */
        #edit-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(18, 18, 18, 0.85); z-index: 1500;
            align-items: flex-start; justify-content: center; backdrop-filter: blur(4px);
            padding-top: 15px; overflow-y: auto; 
        }
        .modal-content {
            background-color: #242526; border: 1px solid #40444b; border-radius: 8px;
            width: 90%; max-width: 360px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            margin-bottom: 260px; 
        }
        .modal-header { font-size: 16px; font-weight: 800; color: #cbd5e1; text-transform: uppercase; margin-bottom: 16px; letter-spacing: 1px; text-align: center; border-bottom: 1px solid #40444b; padding-bottom: 8px; }
        
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 11px; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; font-weight: 600; }
        .form-control {
            width: 100%; box-sizing: border-box; background-color: #1e1e1e; border: 1px solid #40444b;
            color: #f8fafc; padding: 12px; border-radius: 4px; font-family: monospace; font-size: 14px;
        }
        .form-control:focus { outline: none; border-color: #64748b; }
        input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1); opacity: 0.6; cursor: pointer; }
        
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal-actions .btn { flex: 1; padding: 14px 0; }
    </style>
</head>
<body>

    <div id="pin-screen">
        <div class="pin-title" id="pin-msg">ENTER AUTH PIN</div>
        <div class="pin-dots" id="dots-container">
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
            <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        </div>
        <div class="numpad" id="numpad">
            <button class="num-btn" onclick="addDigit(1)">1</button>
            <button class="num-btn" onclick="addDigit(2)">2</button>
            <button class="num-btn" onclick="addDigit(3)">3</button>
            <button class="num-btn" onclick="addDigit(4)">4</button>
            <button class="num-btn" onclick="addDigit(5)">5</button>
            <button class="num-btn" onclick="addDigit(6)">6</button>
            <button class="num-btn" onclick="addDigit(7)">7</button>
            <button class="num-btn" onclick="addDigit(8)">8</button>
            <button class="num-btn" onclick="addDigit(9)">9</button>
            <button class="num-btn action-btn" onclick="removeDigit()">⌫</button>
            <button class="num-btn" onclick="addDigit(0)">0</button>
            <button class="num-btn action-btn" onclick="clearPin()">C</button>
        </div>
        <div class="version-label pin-version" id="pin-version-display"></div>
    </div>

    <div id="main-app">
        <div class="header-panel">
            <h2>MASTER CONTROL</h2>
            <div class="version-label" id="version-display"></div>
            <div class="nav-controls">
                <button class="nav-btn" onclick="refreshData()" title="Обновить базу">🔄</button>
                <button class="nav-btn" onclick="lockApp()" title="Заблокировать">🔒</button>
            </div>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 60%;">Арендатор</th>
                    <th style="width: 40%;">Статус / Контроль</th>
                </tr>
            </thead>
            <tbody id="table-body">
                <tr><td colspan="2" class="loader">Синхронизация...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="edit-modal">
        <div class="modal-content">
            <div class="modal-header">ПАРАМЕТРЫ КЛИЕНТА</div>
            
            <input type="hidden" id="edit-api-key">
            
            <div class="form-group">
                <label class="form-label">ИМЯ АРЕНДАТОРА</label>
                <input type="text" id="edit-name" class="form-control" autocomplete="off">
            </div>
            
            <div class="form-group" style="display: flex; gap: 8px; align-items: flex-end;">
                <div style="flex: 1;">
                    <label class="form-label">КОНТАКТ (ТЕЛЕФОН)</label>
                    <input type="tel" id="edit-contact" class="form-control" autocomplete="off" placeholder="+77001234567">
                </div>
                <a id="call-btn" href="#" class="btn btn-dark" style="display: flex; align-items: center; justify-content: center; height: 45px; width: 50px; text-decoration: none; font-size: 18px; border-radius: 4px; box-sizing: border-box;">📞</a>
            </div>

            <div class="form-group">
                <label class="form-label">ЗАМЕТКИ (ДЛЯ СЕБЯ)</label>
                <textarea id="edit-notes" class="form-control" rows="2" style="resize: none; font-family: inherit; font-size: 14px;"></textarea>
            </div>
            
            <div class="form-group">
                <label class="form-label">ДОСТУП ОТКРЫТ ДО</label>
                <input type="date" id="edit-date" class="form-control">
            </div>
            
            <div class="form-group">
                <label class="form-label">ПОРОГ ПРЕДУПРЕЖДЕНИЯ (ДНЕЙ)</label>
                <input type="number" id="edit-warning" class="form-control" min="1" max="30" inputmode="numeric" pattern="[0-9]*" onfocus="this.select()">
            </div>

            <div class="modal-actions">
                <button class="btn btn-dark" onclick="closeEditModal()">ОТМЕНА</button>
                <button class="btn btn-green" id="save-modal-btn" onclick="saveTenantData()">СОХРАНИТЬ</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = (typeof CONFIG !== 'undefined') ? CONFIG.API_URL : "";
        const currentVersion = 'SYS.VER // ' + ((typeof CONFIG !== 'undefined') ? CONFIG.VERSION : '1.0.5');
        
        document.getElementById('version-display').innerText = currentVersion;
        if(document.getElementById('pin-version-display')) document.getElementById('pin-version-display').innerText = currentVersion;

        let currentPin = "";
        let isAuthenticating = false;
        
        // Глобальный массив хранения состояния данных клиентов в ОЗУ
        window.cachedTenants = [];

        document.getElementById('edit-contact').addEventListener('input', function() {
            const callBtn = document.getElementById('call-btn');
            const cleanPhone = String(this.value).replace(/[^\d+]/g, '');
            if (cleanPhone) {
                callBtn.href = `tel:${cleanPhone}`;
                callBtn.style.opacity = "1";
            } else {
                callBtn.href = "#";
                callBtn.style.opacity = "0.5";
            }
        });

        function updateDots(isError = false) {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((dot, index) => {
                dot.className = 'pin-dot';
                if (isError) dot.classList.add('error');
                else if (index < currentPin.length) dot.classList.add('filled');
            });
        }

        function toggleNumpad(state) {
            const buttons = document.querySelectorAll('.num-btn');
            buttons.forEach(btn => btn.disabled = !state);
        }

        function addDigit(num) {
            if (isAuthenticating || currentPin.length >= 6) return;
            currentPin += num;
            updateDots();
            if (currentPin.length === 6) verifyAndLoad();
        }

        // ИСПРАВЛЕНО: Убрана опечатка 'fn ='
        function removeDigit() {
            if (isAuthenticating || currentPin.length === 0) return;
            currentPin = currentPin.slice(0, -1);
            updateDots();
        }

        function clearPin() {
            if (isAuthenticating) return;
            currentPin = "";
            document.getElementById('pin-msg').innerText = "ENTER AUTH PIN";
            document.getElementById('pin-msg').style.color = "#94a3b8";
            updateDots();
        }

        function lockApp() {
            isAuthenticating = false; // <-- Снимаем системную блокировку
            currentPin = "";
            window.cachedTenants = [];
            updateDots();
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('pin-screen').style.display = 'flex';
            toggleNumpad(true);
            clearPin();
        }

        async function refreshData() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = `<tr><td colspan="2" class="loader">ОБНОВЛЕНИЕ БАЗЫ...</td></tr>`;
            try {
                const response = await fetch(`${API_URL}?action=get_tenants&pin=${currentPin}`, { redirect: 'follow' });
                const data = await response.json();
                if (data.error !== "ACCESS_DENIED") {
                    renderTable(data);
                } else {
                    lockApp();
                }
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="2" class="loader" style="color:#ef4444;">ОШИБКА СИНХРОНИЗАЦИИ</td></tr>`;
            }
        }

        async function verifyAndLoad() {
            isAuthenticating = true;
            toggleNumpad(false);
            document.getElementById('pin-msg').innerText = "VERIFYING...";
            
            try {
                const response = await fetch(`${API_URL}?action=get_tenants&pin=${currentPin}`, { redirect: 'follow' });
                const data = await response.json();
                
                if (data.error === "ACCESS_DENIED") {
                    document.getElementById('pin-msg').innerText = "ACCESS DENIED";
                    document.getElementById('pin-msg').style.color = "#ef4444";
                    updateDots(true);
                    setTimeout(() => {
                        currentPin = ""; isAuthenticating = false; toggleNumpad(true);
                        document.getElementById('pin-msg').innerText = "ENTER AUTH PIN";
                        document.getElementById('pin-msg').style.color = "#94a3b8";
                        updateDots();
                    }, 3000);
                } else {
                    // --- ИСПРАВЛЕННЫЙ БЛОК УСПЕШНОГО ВХОДА ---
                    isAuthenticating = false; // Сбрасываем флаг загрузки
                    toggleNumpad(true);       // Оживляем клавиатуру для будущих сессий
                    document.getElementById('pin-screen').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    renderTable(data);
                }
            } catch (error) {
                document.getElementById('pin-msg').innerText = "CONNECTION ERROR";
                setTimeout(() => { clearPin(); isAuthenticating = false; toggleNumpad(true); }, 1500);
            }
        }

        function renderTable(data) {
            window.cachedTenants = data; 
            const tbody = document.getElementById('table-body');
            let html = '';
            let validCount = 0;

            if (data && data.length > 0) {
                data.forEach(t => {
                    if (!t.api_key || String(t.api_key).trim() === "") return;
                    validCount++;
                    
                    let isBlocked = (t.status !== 'active');
                    let warningThreshold = parseInt(t.warning_days) || 3;
                    let daysLeft = '—';
                    let badgeClass = 'safe-badge';
                    let rawDate = String(t.date_end || "").trim();
                    
                    if (rawDate) {
                        let eDate = null;
                        let parts = rawDate.split('.');
                        if (parts.length === 3) eDate = new Date(parts[2], parts[1] - 1, parts[0]);
                        else eDate = new Date(rawDate);

                        if (eDate && !isNaN(eDate.getTime())) {
                            let today = new Date(); today.setHours(0, 0, 0, 0); eDate.setHours(0, 0, 0, 0);
                            let diff = Math.round((eDate - today) / (1000 * 60 * 60 * 24));
                            daysLeft = diff + ' дн.';
                            if (diff <= warningThreshold) badgeClass = 'danger-badge';
                        }
                    }
                    
                    let rowClass = isBlocked ? 'locked-row' : '';
                    let badgeText = 'Остаток: ' + daysLeft; 
                    let btnClass = isBlocked ? 'btn-green' : 'btn-red';
                    let btnLabel = isBlocked ? 'РАЗБЛОКИРОВАТЬ' : 'ЗАБЛОКИРОВАТЬ';
                    
                    html += `
                        <tr id="row-${t.api_key}" class="${rowClass}">
                            <td class="client-col">
                                <span class="client-name" onclick="openEditModal('${t.api_key}')">${t.client_name}</span>
                                <span class="client-key">${t.api_key}</span>
                            </td>
                            <td>
                                <div class="control-cell">
                                    <div id="badge-${t.api_key}" class="days-badge ${badgeClass}">${badgeText}</div>
                                    <button id="btn-${t.api_key}" class="btn ${btnClass}" onclick="toggleBlock('${t.api_key}', '${t.status}')">
                                        ${btnLabel}
                                    </button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }

            if (validCount === 0) html = `<tr><td colspan="2" class="loader">БАЗА ПУСТА</td></tr>`;
            tbody.innerHTML = html;
        }

        async function toggleBlock(apiKey, currentStatus) {
            const button = document.getElementById(`btn-${apiKey}`);
            const row = document.getElementById(`row-${apiKey}`);
            const actionText = (currentStatus === 'active') ? 'заблокировать' : 'разблокировать';
            if (!confirm(`Вы уверены, что хотите ${actionText} ${apiKey}?`)) return;
            
            button.disabled = true; button.innerText = 'ОЖИДАЙТЕ...';
            try {
                const response = await fetch(`${API_URL}?action=toggle_status&api_key=${apiKey}&current_status=${currentStatus}&pin=${currentPin}`, { redirect: 'follow' });
                const res = await response.json();
                if (res.error) throw new Error(res.message || res.error);
                
                const newStatus = res.newStatus;
                if (newStatus === 'active') {
                    row.classList.remove('locked-row'); button.className = 'btn btn-red'; button.innerText = 'ЗАБЛОКИРОВАТЬ';
                } else {
                    row.classList.add('locked-row'); button.className = 'btn btn-green'; button.innerText = 'РАЗБЛОКИРОВАТЬ';
                }
                button.setAttribute('onclick', `toggleBlock('${apiKey}', '${newStatus}')`);
                
                const t = window.cachedTenants.find(item => item.api_key === apiKey);
                if(t) t.status = newStatus;

            } catch (err) {
                alert('Ошибка: ' + err.message);
                button.innerText = (currentStatus === 'active') ? 'ЗАБЛОКИРОВАТЬ' : 'РАЗБЛОКИРОВАТЬ';
            } finally { 
                // ИСПРАВЛЕНО: Убрана точка перед finally
                button.disabled = false; 
            }
        }

        function openEditModal(apiKey) {
            const t = window.cachedTenants.find(item => item.api_key === apiKey);
            if (!t) return;

            document.getElementById('edit-api-key').value = t.api_key;
            document.getElementById('edit-name').value = t.client_name || "";
            document.getElementById('edit-warning').value = t.warning_days || 3;
            document.getElementById('edit-contact').value = t.contact || "";
            
            // Закомментируйте старые заметки и вставьте дебаггер:
            // document.getElementById('edit-notes').value = t.notes || "";
            document.getElementById('edit-notes').value = "ЛОГ СЕРВЕРА: " + String(t.date_end);
            
            const callBtn = document.getElementById('call-btn');
            const cleanPhone = String(t.contact || "").replace(/[^\d+]/g, '');
            if (cleanPhone) {
                callBtn.href = `tel:${cleanPhone}`;
                callBtn.style.opacity = "1";
            } else {
                callBtn.href = "#";
                callBtn.style.opacity = "0.5";
            }
            
            let rawDate = String(t.date_end || "").trim();
            
            // Если в строке есть пробел (значит пришло время), отрезаем его, чтобы календарь не сломался
            if (rawDate.includes(' ')) {
                rawDate = rawDate.split(' ')[0];
            }
            
            document.getElementById('edit-date').value = (rawDate.includes('-')) ? rawDate : "";
            
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
            document.getElementById('save-modal-btn').innerText = 'СОХРАНИТЬ';
            document.getElementById('save-modal-btn').disabled = false;
        }

        async function saveTenantData() {
            const btn = document.getElementById('save-modal-btn');
            const apiKey = document.getElementById('edit-api-key').value;
            const newName = document.getElementById('edit-name').value;
            const newDate = document.getElementById('edit-date').value;
            const newWarning = document.getElementById('edit-warning').value;
            const newContact = document.getElementById('edit-contact').value;
            const newNotes = document.getElementById('edit-notes').value;

            if (!newName) {
                alert("Имя арендатора обязательно для заполнения"); return;
            }

            btn.disabled = true; btn.innerText = 'СОХРАНЕНИЕ...';

            try {
                let formattedDate = "";
                if (newDate) {
                    const dateParts = newDate.split('-');
                    formattedDate = `${dateParts[2]}.${dateParts[1]}.${dateParts[0]}`;
                }

                const query = `?action=update_tenant&pin=${currentPin}&api_key=${encodeURIComponent(apiKey)}&client_name=${encodeURIComponent(newName)}&date_end=${encodeURIComponent(formattedDate)}&warning_days=${encodeURIComponent(newWarning)}&contact=${encodeURIComponent(newContact)}&notes=${encodeURIComponent(newNotes)}`;
                
                const response = await fetch(`${API_URL}${query}`, { redirect: 'follow' });
                const res = await response.json();
                if (res.error) throw new Error(res.error || res.message);
                
                closeEditModal();
                refreshData(); 
            } catch (error) {
                alert('Ошибка при сохранении: ' + error.message);
                btn.disabled = false; btn.innerText = 'СОХРАНИТЬ';
            }
        }
    </script>
</body>
</html>
