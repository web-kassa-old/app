<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POS Noir - Testing Lab</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --card-bg: #141414;
            --text: #e0e0e0;
            --accent-green: #2ecc71;
            --accent-blue: #3498db;
            --accent-red: #e74c3c;
            --accent-grey: #2c2c2c; /* Более темный для кнопок камеры */
            --border: #333;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 10px;
            user-select: none;
        }

        #catalog {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 100px;
        }

        .c-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
        }

        .i-name { font-size: 14px; margin-bottom: 5px; }
        .i-price { color: var(--accent-green); font-size: 16px; font-weight: bold; }
        .i-stock { font-size: 11px; opacity: 0.5; margin-top: 5px; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .settings-box {
            background: #111;
            width: 90%;
            max-width: 380px;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-align: center;
        }

        .s-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid;
            background: transparent;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn-green { background: #1a3a20; border-color: var(--accent-green); color: var(--accent-green); }
        .btn-blue  { background: #0f2c40; border-color: var(--accent-blue); color: var(--accent-blue); }
        .btn-grey  { background: #222; border-color: #555; color: #fff; }
        .btn-red   { background: #3c1a1a; border-color: var(--accent-red); color: var(--accent-red); }

        .btn-row {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-row .s-btn { margin-bottom: 0; flex: 1; }

        #item-preview {
            width: 100%;
            max-height: 250px;
            object-fit: contain;
            border-radius: 4px;
            background: #000;
            margin-bottom: 15px;
            border: 1px solid #222;
        }
    </style>
</head>
<body>

    <div id="catalog"><!-- Рендер товаров --></div>

    <!-- Модальное окно управления товаром -->
    <div id="item-menu-modal" class="modal-overlay" onclick="handleOutsideClick()">
        <div class="settings-box" onclick="event.stopPropagation()">
            <div id="menu-item-name" style="font-size: 16px; margin-bottom: 15px; font-weight: bold; color: #fff;">Товар</div>
            
            <div id="view-photo-container" style="display: none;">
                <img id="item-preview" src="">
            </div>

            <!-- 1. Кнопка "В КОРЗИНУ" -->
            <button id="btn-add-cart" class="s-btn btn-green" onclick="confirmAddFromMenu()">
                🛒 В КОРЗИНУ
            </button>

            <!-- 2. Кнопка "СОХРАНИТЬ В БАЗУ" (после снимка) -->
            <button id="btn-save-db" class="s-btn btn-blue" onclick="confirmUpload()" style="display: none;">
                💾 СОХРАНИТЬ В БАЗУ
            </button>
            
            <!-- 3. ДВЕ КНОПКИ: Камера и Галерея -->
            <div id="photo-controls" class="btn-row">
                <button class="s-btn btn-grey" onclick="triggerCamera()">📸 КАМЕРА</button>
                <button class="s-btn btn-grey" onclick="triggerGallery()">📂 ГАЛЕРЕЯ</button>
            </div>

            <!-- 4. Кнопка выхода -->
            <button id="btn-cancel" class="s-btn btn-red" onclick="handleCancel()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- СКРЫТЫЕ ИНПУТЫ -->
    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;" onchange="handlePhoto(event)">
    <input type="file" id="gallery-input" accept="image/*" style="display: none;" onchange="handlePhoto(event)">
    
    <canvas id="resize-canvas" style="display: none;"></canvas>

    <script src="config.js"></script>
    <script>
        let db = [];
        let selectedItemId = null;
        let tempBase64 = null;

        async function load() {
            try {
                const res = await fetch(APPS_SCRIPT_URL);
                const data = await res.json();
                db = data.items || data;
                render();
            } catch (e) { alert("Ошибка загрузки данных"); }
        }

        function render() {
            const container = document.getElementById('catalog');
            container.innerHTML = db.map(i => {
                const hasPhoto = i.img && i.img.length > 10;
                return `
                    <div class="c-item" onclick="openItemMenu('${i.id}')">
                        <div class="i-name">${hasPhoto ? '🖼️ ' : ''}${i.name}</div>
                        <div class="i-price">${Number(i.price).toLocaleString()} ₸</div>
                        <div class="i-stock">Остаток: ${i.stock || 0}</div>
                    </div>
                `;
            }).join('');
        }

        function openItemMenu(id) {
            selectedItemId = id;
            tempBase64 = null;
            const item = db.find(x => x.id === id);
            
            document.getElementById('menu-item-name').innerText = item.name;
            resetUIState();

            if (item.img && item.img.length > 10) {
                showElement('view-photo-container', true);
                document.getElementById('item-preview').src = item.img;
            } else {
                showElement('view-photo-container', false);
            }
            
            document.getElementById('btn-cancel').innerText = "ЗАКРЫТЬ";
            document.getElementById('item-menu-modal').style.display = 'flex';
        }

        function handleCancel() {
            if (tempBase64) { openItemMenu(selectedItemId); }
            else { closeItemMenu(); }
        }

        function closeItemMenu() { document.getElementById('item-menu-modal').style.display = 'none'; }
        function handleOutsideClick() { closeItemMenu(); }

        // ТРИГГЕРЫ
        function triggerCamera() { document.getElementById('camera-input').click(); }
        function triggerGallery() { document.getElementById('gallery-input').click(); }

        async function handlePhoto(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('resize-canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_W = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX_W) { h *= MAX_W/w; w = MAX_W; }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    
                    tempBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    document.getElementById('item-preview').src = tempBase64;
                    showElement('view-photo-container', true);
                    showElement('btn-add-cart', false); 
                    showElement('btn-save-db', true);
                    document.getElementById('btn-cancel').innerText = "ОТМЕНА";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function confirmUpload() {
            const btn = document.getElementById('btn-save-db');
            btn.innerText = "⌛ СОХРАНЕНИЕ...";
            btn.disabled = true;

            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'upload_photo',
                        item_id: selectedItemId,
                        base64: tempBase64
                    })
                });
                const result = await res.json();
                if (result.success) {
                    btn.innerText = "✅ ГОТОВО";
                    setTimeout(() => location.reload(), 800);
                } else { throw new Error(result.error); }
            } catch (e) {
                alert("Ошибка: " + e.message);
                btn.innerText = "💾 СОХРАНИТЬ В БАЗУ";
                btn.disabled = false;
            }
        }

        function confirmAddFromMenu() {
            if (typeof add === "function") add(selectedItemId);
            else alert("Добавлено в корзину");
            closeItemMenu();
        }

        function showElement(id, isShow) { document.getElementById(id).style.display = isShow ? 'block' : 'none'; }
        
        function resetUIState() {
            showElement('btn-add-cart', true);
            showElement('btn-save-db', false);
            document.getElementById('btn-save-db').disabled = false;
        }

        load();
    </script>
</body>
</html>
