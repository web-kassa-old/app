<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="manifest" href="manifest_test.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>POS Noir TEST PIN</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "Courier New", Courier, monospace; }
        
        body { 
            background: #0a0a0a; color: #fff; 
            height: 100dvh; 
            display: flex; flex-direction: column; overflow: hidden; transition: background-color 0.3s; 
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

        .header-area { flex-shrink: 0; border-bottom: 1px solid #222; }
        .modes { display: flex; padding: 4px; gap: 4px; }
        .m-btn { flex: 1; padding: 12px; border: 1px solid #333; background: #111; color: #444; font-weight: 900; border-radius: 4px; font-size: 13px; text-transform: uppercase; transition: 0.2s; }
        .m-btn.active-s { background: #1a3a20; color: #2ecc71; border-color: #2ecc71; }
        .m-btn.active-r { background: #3a1a1a; color: #e74c3c; border-color: #e74c3c; }

        .search-area { padding: 0 4px 4px; }
        .s-input { width: 100%; background: #141414; color: #fff; border: 1px solid #333; border-radius: 4px; padding: 10px; font-size: 14px; outline: none; }

        .list-header { display: flex; align-items: center; gap: 8px; padding: 4px 14px; font-size: 10px; color: #666; font-weight: bold; border-bottom: 1px solid #222; }

        #catalog { 
            flex-grow: 1; 
            min-height: 0; 
            overflow-y: auto; 
            padding: 4px; 
            border-bottom: 1px solid #222; 
        }
        
        .c-item { background: #141414; border: 1px solid #222; border-radius: 4px; padding: 8px 10px; margin-bottom: 3px; display: flex; align-items: center; gap: 8px; }
        .i-name { flex-grow: 1; font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .i-price { width: 85px; font-size: 13px; font-weight: bold; text-align: right; color: #fff; }
        .i-stock { width: 45px; font-size: 14px; font-weight: bold; text-align: center; color: #00ffff; background: #003333; border: 1px solid #008888; border-radius: 3px; padding: 2px 0; }

        .cart-sec { flex-shrink: 0; background: rgba(0,0,0,0.5); border-top: 2px solid #2ecc71; display: flex; flex-direction: column; max-height: 40dvh; }
        .cart-sec.r-theme { border-top-color: #e74c3c; }
        #cart-list { overflow-y: auto; padding: 4px; padding-bottom: 15px; }
        
        .qty-box { display: flex; align-items: center; background: #000; border: 1px solid #333; border-radius: 4px; height: 38px; overflow: hidden; }
        .q-btn { background: #1a1a1a; color: #f1c40f; width: 38px; height: 100%; border: none; font-size: 20px; cursor: pointer; }
        .p-input { width: 85px; height: 38px; background: #000; color: #f1c40f; border: 1px solid #333; text-align: right; padding: 8px; border-radius: 4px; font-size: 15px; font-weight: bold; outline: none; }
        
        .footer { flex-shrink: 0; padding: 6px 4px; border-top: 1px solid #222; }
        .total-box { display: flex; justify-content: space-between; font-size: 18px; font-weight: 900; margin-bottom: 6px; padding: 0 4px; }
        
        .btns { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; }
        .pay { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 50px; border: none; border-radius: 4px; color: #fff; cursor: pointer; padding: 2px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .settings-box { width: 100%; max-width: 350px; background: #111; border: 1px solid #444; padding: 20px; border-radius: 8px; text-align: center; }

        /* Стили кнопок меню товара */
        .s-btn { width: 100%; padding: 15px; margin-bottom: 12px; border-radius: 8px; border: 1px solid; background: transparent; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; font-family: inherit; }
        .btn-green { background: #1a3a20; border-color: #2ecc71; color: #2ecc71; }
        .btn-blue  { background: #0f2c40; border-color: #3498db; color: #3498db; }
        .btn-grey  { background: #222; border-color: #666; color: #eee; }
        .btn-red   { background: #3a1a1a; border-color: #e74c3c; color: #e74c3c; }
        .s-btn:disabled { opacity: 0.5; }

        .pin-display { height: 50px; background: #000; border: 1px solid #333; border-radius: 6px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; font-size: 36px; color: #f1c40f; letter-spacing: 12px; }
        .pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .pin-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; border-radius: 6px; height: 65px; font-size: 28px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        #item-preview { width: 100%; max-height: 250px; object-fit: contain; border-radius: 8px; border: 1px solid #444; margin-bottom: 15px; background: #000; }
    </style>
</head>
<body>

    <div class="header-area">
        <div class="modes">
            <button id="ms" class="m-btn active-s" onclick="sm('sale')" data-i18n="btn_sale">ПРОДАЖА</button>
            <button id="mr" class="m-btn" onclick="sm('return')" data-i18n="btn_return">ВОЗВРАТ</button>
            <button class="m-btn" style="flex: 0.2; background: #111; color: #888; border-color: #333;" onclick="openPinModal(function(){ openReport(); })">📊 ПИН</button>
        </div>
        
        <div class="search-area" style="display: flex; gap: 10px;">
            <input type="text" id="sb" class="s-input" data-i18n-placeholder="search_placeholder" placeholder="ПОИСК..." onkeyup="filter()" style="flex-grow: 1; margin: 0;">
            <button id="btn-settings" onclick="openSettings()" style="padding: 0 15px; background: #222; color: #eee; border: 1px solid #555; border-radius: 4px; cursor: pointer;">
                ⚙️ <span id="queue-counter" style="background: #e74c3c; color: #fff; padding: 2px 6px; border-radius: 10px; font-size: 10px; display: none;">0</span>
            </button>
        </div>
        
        <div class="list-header">
            <div style="flex-grow: 1;">НАИМЕНОВАНИЕ <span id="app-version" style="font-size: 9px; color: #888; background: #1a1a1a; padding: 2px 6px; border-radius: 6px;">v: 5.5.0</span></div>
            <div style="width: 85px; text-align: right;">ЦЕНА</div>
            <div style="width: 45px; text-align: center;">ОСТ</div>
        </div>
    </div>

    <div id="catalog"></div>

    <div id="cs" class="cart-sec">
        <div id="cart-list"></div>
        <div class="footer">
            <div class="total-box">
                <span id="tl">ИТОГО:</span>
                <span id="ta">0 ₸</span>
            </div>
            <div class="btns">
                <button class="pay" style="background:#27ae60" onclick="initPay('cash', 'Наличные')"><span style="font-size:8px">Нал</span><span id="sum-cash" style="font-size:9px">0 ₸</span></button>
                <button class="pay" style="background:#c0392b" onclick="initPay('qr_kaspi', 'Kaspi QR')"><span style="font-size:8px">QR</span><span id="sum-qr" style="font-size:9px">0 ₸</span></button>
                <button class="pay" style="background:#8e44ad" onclick="initPay('installment', 'Kaspi Red')"><span style="font-size:8px">Red</span><span id="sum-red" style="font-size:9px">0 ₸</span></button>
                <button class="pay" style="background:#2980b9" onclick="initPay('pos_terminal', 'Карта')"><span style="font-size:8px">Карт</span><span id="sum-card" style="font-size:9px">0 ₸</span></button>
                <button class="pay" style="background:#f39c12; color:#000" onclick="initPay('transfer', 'Перевод')"><span style="font-size:8px">Пер</span><span id="sum-trans" style="font-size:9px">0 ₸</span></button>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ТОВАРА (КОРЗИНА / ФОТО / БАЗА) -->
    <div id="item-menu-modal" class="modal-overlay" onclick="closeItemMenu()">
        <div class="settings-box" onclick="event.stopPropagation()">
            <div id="menu-item-name" style="font-size: 14px; font-weight: bold; margin-bottom: 15px;">Название товара</div>
            
            <div id="view-photo-container" style="display: none;">
                <img id="item-preview" src="">
            </div>

            <button id="btn-add-cart" class="s-btn btn-green" onclick="confirmAddFromMenu()">🛒 В КОРЗИНУ</button>
            <button id="btn-save-db" class="s-btn btn-blue" onclick="confirmUpload()" style="display: none;">💾 СОХРАНИТЬ В БАЗУ</button>
            <button id="btn-take-photo" class="s-btn btn-grey" onclick="triggerCamera()">📸 СДЕЛАТЬ ФОТО</button>
            <button id="btn-retake-photo" class="s-btn btn-grey" onclick="triggerCamera()" style="display: none;">📸 ПЕРЕСНЯТЬ</button>
            <button id="btn-cancel" class="s-btn btn-red" onclick="handleCancel()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <!-- ДРУГИЕ МОДАЛЬНЫЕ ОКНА (ОТЧЕТ, НАСТРОЙКИ, ПИН) -->
    <div id="receipt-modal" class="modal-overlay">
        <div class="settings-box" style="border: 2px dashed #444;">
            <div id="r-title" style="font-weight:bold; margin-bottom:10px;">ПОДТВЕРЖДЕНИЕ</div>
            <div id="r-method" style="color:#f1c40f; margin-bottom:15px; font-size:12px;"></div>
            <div id="r-items-list" style="text-align:left; font-size:12px; margin-bottom:10px;"></div>
            <div id="r-total" style="font-weight:bold; border-top:1px solid #444; padding-top:10px;">ИТОГО: 0 ₸</div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="s-btn btn-grey" style="margin:0" onclick="cancelTx()">ОТМЕНА</button>
                <button id="btn-confirm" class="s-btn btn-green" style="margin:0">РАСТАТЬ</button>
            </div>
        </div>
    </div>

    <div id="pin-modal" class="modal-overlay">
        <div class="settings-box">
            <div style="color:#888; margin-bottom:15px; font-size:14px;">ВВЕДИТЕ ПИН-КОД</div>
            <div id="pin-display" class="pin-display"></div>
            <div class="pin-grid">
                <div class="pin-btn" onclick="pinPress('1')">1</div><div class="pin-btn" onclick="pinPress('2')">2</div><div class="pin-btn" onclick="pinPress('3')">3</div>
                <div class="pin-btn" onclick="pinPress('4')">4</div><div class="pin-btn" onclick="pinPress('5')">5</div><div class="pin-btn" onclick="pinPress('6')">6</div>
                <div class="pin-btn" onclick="pinPress('7')">7</div><div class="pin-btn" onclick="pinPress('8')">8</div><div class="pin-btn" onclick="pinPress('9')">9</div>
                <div class="pin-btn" style="color:#e74c3c" onclick="pinClear()">C</div><div class="pin-btn" onclick="pinPress('0')">0</div><div class="pin-btn" style="font-size:12px" onclick="closePinModal()">ESC</div>
            </div>
        </div>
    </div>

    <input type="file" id="camera-input" accept="image/*" capture="environment" style="display: none;" onchange="handlePhoto(event)">
    <canvas id="resize-canvas" style="display: none;"></canvas>

    <!-- СКРИПТЫ -->
    <script src="config.js"></script>
    <script>
        let db = [], cart = [], mode = 'sale', pendingMethod = null;
        let selectedItemId = null, tempBase64 = null;

        // Загрузка
        async function load() {
            const cachedDb = localStorage.getItem('db_cache');
            if (cachedDb) { db = JSON.parse(cachedDb); render(); }
            if (!navigator.onLine) return;
            try {
                const res = await fetch(APPS_SCRIPT_URL + "?t=" + Date.now(), { redirect: 'follow' });
                const data = await res.json();
                db = data.items || [];
                if (data.pin) localStorage.setItem('pos_pin', data.pin);
                render();
                localStorage.setItem('db_cache', JSON.stringify(db));
            } catch (e) { console.error("Ошибка загрузки", e); }
        }

        function render() {
            const container = document.getElementById('catalog');
            container.innerHTML = db.map(i => {
                const hasPhoto = i.img && i.img.length > 10;
                const photoIcon = hasPhoto ? '<span style="color:#f1c40f;margin-right:5px;" onclick="openItemMenu(\''+i.id+'\'); event.stopPropagation();">🖼️</span>' : '<span style="color:#333;margin-right:5px;" onclick="openItemMenu(\''+i.id+'\'); event.stopPropagation();">📷</span>';
                return `
                    <div class="c-item" onclick="add('${i.id}')">
                        <div class="i-name">${photoIcon}${i.name}</div>
                        <div class="i-price">${Number(i.price).toLocaleString()} ₸</div>
                        <div class="i-stock">${i.stock}</div>
                    </div>
                `;
            }).join('');
        }

        // ЛОГИКА МЕНЮ ТОВАРА
        function openItemMenu(id) {
            selectedItemId = id;
            tempBase64 = null;
            const item = db.find(x => x.id === id);
            document.getElementById('menu-item-name').innerText = item.name;
            
            showElement('btn-add-cart', true);
            showElement('btn-save-db', false);
            const preview = document.getElementById('item-preview');

            if (item.img && item.img.length > 10) {
                showElement('view-photo-container', true);
                let fileId = item.img.includes('id=') ? item.img.split('id=')[1] : "";
                preview.src = fileId ? `https://lh3.googleusercontent.com/d/${fileId}` : item.img;
                showElement('btn-take-photo', false);
                showElement('btn-retake-photo', true);
            } else {
                showElement('view-photo-container', false);
                showElement('btn-take-photo', true);
                showElement('btn-retake-photo', false);
            }
            document.getElementById('btn-cancel').innerText = "ЗАКРЫТЬ";
            document.getElementById('item-menu-modal').style.display = 'flex';
        }

        function handleCancel() {
            if (tempBase64) openItemMenu(selectedItemId); // Сброс черновика
            else closeItemMenu();
        }

        function closeItemMenu() { document.getElementById('item-menu-modal').style.display = 'none'; }
        function triggerCamera() { document.getElementById('camera-input').click(); }

        function handlePhoto(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('resize-canvas');
                    const ctx = canvas.getContext('2d');
                    const MAX_W = 800;
                    let w = img.width, h = img.height;
                    if (w > MAX_W) { h *= MAX_W/w; w = MAX_W; }
                    canvas.width = w; canvas.height = h;
                    ctx.drawImage(img, 0, 0, w, h);
                    tempBase64 = canvas.toDataURL('image/jpeg', 0.7);
                    
                    document.getElementById('item-preview').src = tempBase64;
                    showElement('view-photo-container', true);
                    showElement('btn-add-cart', false);
                    showElement('btn-save-db', true);
                    showElement('btn-take-photo', false);
                    showElement('btn-retake-photo', true);
                    document.getElementById('btn-cancel').innerText = "ОТМЕНА";
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function confirmUpload() {
            const btn = document.getElementById('btn-save-db');
            btn.innerText = "⏳ СОХРАНЕНИЕ...";
            btn.disabled = true;
            try {
                const res = await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'upload_photo', item_id: selectedItemId, base64: tempBase64 })
                });
                const result = await res.json();
                if (result.success) { location.reload(); }
                else { alert("Ошибка: " + result.error); }
            } catch (e) { alert("Ошибка сети"); }
            finally { btn.disabled = false; }
        }

        function confirmAddFromMenu() { add(selectedItemId); closeItemMenu(); }

        // КОРЗИНА И ПРОДАЖА (из вашей версии 5.4.0)
        function add(id) {
            const p = db.find(x => x.id === id);
            const inC = cart.find(x => x.id === id);
            if (inC) inC.qty++;
            else cart.push({id:p.id, name:p.name, qty:1, price:p.price, cost:p.cost});
            updateCart();
        }

        function updateCart() {
            const list = document.getElementById('cart-list');
            list.innerHTML = cart.map(i => `
                <div style="background:#111; padding:8px; margin-bottom:4px; border:1px solid #222; border-radius:4px; display:flex; justify-content:space-between; align-items:center;">
                    <div style="font-size:11px; flex:1;">${i.name}</div>
                    <div style="display:flex; align-items:center; gap:10px;">
                        <input type="number" value="${i.qty}" style="width:40px; background:#000; color:#fff; border:1px solid #333; text-align:center;" onchange="updateQty('${i.id}', this.value)">
                        <div style="font-weight:bold; width:70px; text-align:right;">${(i.qty * i.price).toLocaleString()}</div>
                        <div style="color:#e74c3c; padding:0 5px;" onclick="rm('${i.id}')">✕</div>
                    </div>
                </div>
            `).join('');
            const s = cart.reduce((a, b) => a + (b.price * b.qty), 0);
            document.getElementById('ta').innerText = s.toLocaleString() + ' ₸';
        }

        function rm(id) { cart = cart.filter(x => x.id !== id); updateCart(); }
        function updateQty(id, v) { const i = cart.find(x => x.id === id); if(i) i.qty = parseInt(v) || 0; updateCart(); }

        // ВСПОМОГАТЕЛЬНОЕ
        function showElement(id, isShow) { document.getElementById(id).style.display = isShow ? 'block' : 'none'; }
        function sm(m) { mode = m; document.getElementById('ms').classList.toggle('active-s', m==='sale'); document.getElementById('mr').classList.toggle('active-r', m==='return'); }
        function filter() { let q = document.getElementById('sb').value.toLowerCase(); document.querySelectorAll('.c-item').forEach(el => { el.style.display = el.innerText.toLowerCase().includes(q) ? 'flex' : 'none'; }); }

        // ПИН-КОД (Ваша бронированная логика)
        let currentPin = ''; let targetAction = null;
        function openPinModal(action) { currentPin = ''; targetAction = action; document.getElementById('pin-display').innerText = ''; document.getElementById('pin-modal').style.display = 'flex'; }
        function closePinModal() { document.getElementById('pin-modal').style.display = 'none'; }
        function pinPress(d) { if(currentPin.length < 4) { currentPin += d; document.getElementById('pin-display').innerText = '•'.repeat(currentPin.length); if(currentPin.length === 4) setTimeout(checkPin, 200); } }
        function pinClear() { currentPin = ''; document.getElementById('pin-display').innerText = ''; }
        function checkPin() { let truePin = localStorage.getItem('pos_pin') || '0000'; if(currentPin === truePin) { closePinModal(); if(targetAction) targetAction(); } else { alert("Неверный ПИН"); pinClear(); } }

        load();
    </script>
</body>
</html>
